<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Analytics Agent — Аналитика прибыльности проектов">
    <title>{% block title %}AI Analytics Agent{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="/static/js/charts.js" defer></script>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <span class="logo-text">AAA</span>
        </div>
        <nav>
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                <span class="icon">📊</span> Дашборд
            </a>
            <a href="/projects" class="{% if request.url.path == '/projects' %}active{% endif %}">
                <span class="icon">📁</span> Проекты
            </a>
            <a href="/stacks" class="{% if request.url.path == '/stacks' %}active{% endif %}">
                <span class="icon">⚡</span> Стеки
            </a>
            <a href="/tasks" class="{% if request.url.path == '/tasks' %}active{% endif %}">
                <span class="icon">📋</span> Задачи
            </a>
            <a href="/developers" class="{% if request.url.path == '/developers' %}active{% endif %}">
                <span class="icon">👥</span> Разработчики
            </a>
        </nav>
        <div style="padding: 12px 16px; font-size: 11px; color: var(--text-muted);">
            AI Analytics Agent v1.0
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
